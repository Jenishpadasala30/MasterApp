services:
  mysql:
    image: mysql:8.0
    container_name: n5arpita-mysql
    environment:
      MYSQL_DATABASE: n5arpita
      MYSQL_USER: n5arpita_user
      MYSQL_PASSWORD: n5arpita_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: n5arpita-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/n5arpita?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: n5arpita_user
      SPRING_DATASOURCE_PASSWORD: n5arpita_password
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: n5arpita-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  mysql_data:
